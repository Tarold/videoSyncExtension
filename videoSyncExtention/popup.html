<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SyncPlayer Rooms</title>
    <style>
      body {
        width: 300px;
        font-family: 'Segoe UI', sans-serif;
        padding: 15px;
        background: #202124;
        color: white;
      }
      h1 {
        font-size: 18px;
        margin-top: 0;
        text-align: center;
        color: #8ab4f8;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }
      .btn-primary {
        background: #8ab4f8;
        color: #202124;
      }
      .btn-secondary {
        background: #3c4043;
        color: #e8eaed;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .hidden {
        display: none;
      }
      input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        margin-bottom: 10px;
        background: #3c4043;
        border: 1px solid #5f6368;
        color: white;
        border-radius: 5px;
        text-align: center;
        font-size: 18px;
        letter-spacing: 5px;
      }
      .room-info {
        text-align: center;
        padding: 20px;
        background: #303134;
        border-radius: 8px;
      }
      .room-emoji {
        font-size: 40px;
        margin: 10px 0;
      }
      .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        margin: 2px;
      }
      .status-connected {
        background: #1e8e3e;
      }
      .status-disconnected {
        background: #d93025;
      }
      .code-display {
        font-size: 24px;
        font-family: monospace;
        font-weight: bold;
        color: #fdd663;
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <h1>SyncPlayer 2.2</h1>

    <div id="screen-menu">
      <button id="btn-create" class="btn btn-primary">
        ➕ Створити кімнату
      </button>
      <button id="btn-join-menu" class="btn btn-secondary">
        🚪 Увійти в кімнату
      </button>
      <p style="text-align: center; font-size: 12px; margin-top: 15px">
        <br />Права кнопка миші для синхронізації відео.
      </p>
    </div>

    <div id="screen-join" class="hidden">
      <p style="text-align: center">Введіть 3 цифри:</p>
      <input type="text" id="room-code-input" maxlength="3" placeholder="000" />
      <button id="btn-join-action" class="btn btn-primary">Увійти</button>
      <button id="btn-back" class="btn btn-secondary">Назад</button>
    </div>

    <div id="screen-room" class="hidden">
      <div class="room-info">
        <div>
          Кімната <span id="display-room-id" class="code-display">---</span>
        </div>
        <div id="display-room-emoji" class="room-emoji">Loading...</div>

        <div
          style="
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
          "
        >
          <div id="connection-status" class="status-badge status-disconnected">
            Server: Off
          </div>
          <div id="video-status" class="status-badge status-disconnected">
            Video: None ❌
          </div>
        </div>

        <p style="font-size: 12px; color: #9aa0a6; margin-top: 15px">
          Поділись кодом з друзями
        </p>
      </div>

      <div
        id="admin-controls"
        class="hidden"
        style="
          margin-top: 10px;
          border-top: 1px solid #5f6368;
          padding-top: 10px;
        "
      >
        <p style="margin: 5px 0; font-size: 12px">👑 Адмін панель</p>
        <label
          style="font-size: 12px; display: flex; align-items: center; gap: 5px"
        >
          <input type="checkbox" id="chk-democracy" /> Демократія (всі керують)
        </label>
      </div>
      <button
        id="btn-unsync-video"
        class="btn btn-secondary hidden"
        style="margin-top: 15px"
      >
        Прибрати синхронізацію відео
      </button>
      <button id="btn-leave" class="btn btn-secondary" style="margin-top: 15px">
        Вийти
      </button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
